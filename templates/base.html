<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}My News{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<nav>
  <a class="nav-logo" href="/">📰 My News</a>
  <div class="nav-links">
    <a href="/" {% if active == 'dashboard' %}class="active"{% endif %}>대시보드</a>
    <a href="/briefing" {% if active == 'briefing' %}class="active"{% endif %}>브리핑</a>
    <a href="/settings" {% if active == 'settings' %}class="active"{% endif %}>설정</a>
    <a href="/wiki" {% if active == 'wiki' %}class="active"{% endif %}>위키</a>
  </div>
</nav>
<main>
  {% block content %}{% endblock %}
</main>
<script src="/static/app.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
